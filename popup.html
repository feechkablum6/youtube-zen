<!DOCTYPE html>
<html lang="ru">
<head>

  <title>YouTube Zen</title>
  <link rel="stylesheet" href="./src/popup/popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <div class="logo" aria-hidden="true">Z</div>
